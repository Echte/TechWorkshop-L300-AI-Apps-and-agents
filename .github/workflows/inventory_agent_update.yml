name: Deploy Inventory Agent

on:
  push:
    branches:
      - main
    paths:
      - 'src/prompts/InventoryAgentPrompt.txt'
      - 'src/infra/agents/inventory-agent.json'
      - '.github/workflows/inventory_agent_update.yml'
  workflow_dispatch:

jobs:
  deploy-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login via Azure CLI
        uses: azure/login@v2.1.1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy inventory-agent agent to Foundry
        env:
          FOUNDRY_ENDPOINT: ${{ secrets.FOUNDRY_ENDPOINT }}
          GPT_DEPLOYMENT: ${{ secrets.GPT_DEPLOYMENT }}
        run: |
          set -euo pipefail

          if [ -z "${FOUNDRY_ENDPOINT:-}" ]; then
            echo "::error::Missing FOUNDRY_ENDPOINT secret."
            exit 1
          fi

          if [ -z "${GPT_DEPLOYMENT:-}" ]; then
            echo "::error::Missing GPT_DEPLOYMENT secret. Set it to your Foundry model deployment name."
            exit 1
          fi

          jq --arg model "$GPT_DEPLOYMENT" \
             --rawfile instructions src/prompts/InventoryAgentPrompt.txt \
             '.definition.model = $model | .definition.instructions = $instructions' \
             src/infra/agents/inventory-agent.json > /tmp/agent-payload.json

          jq -e '.definition.model | type == "string" and length > 0' /tmp/agent-payload.json > /dev/null
          jq -e '.definition.instructions | type == "string" and length > 0' /tmp/agent-payload.json > /dev/null

          az rest --method POST \
            --url "${FOUNDRY_ENDPOINT}/agents/inventory-agent/versions?api-version=2025-11-15-preview" \
            --headers "Content-Type=application/json" \
            --resource "https://ai.azure.com" \
            --body @/tmp/agent-payload.json

          echo "inventory-agent agent deployed successfully."
